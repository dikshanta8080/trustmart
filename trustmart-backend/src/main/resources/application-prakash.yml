server:
  port: 8081

kafka:
  bootstrap-servers: localhost:9092

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: defaultexample@gmail.com
    password: xxxxx xxxxx xxxxx xxxxx
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  datasource:
    url: jdbc:postgresql://localhost:5432/trustmart
    username: postgres
    password: 123456

    hikari:
      pool-name: TrustMartPool
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 5000

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

file:
  upload-dir: uploads
