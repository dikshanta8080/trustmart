<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">

<table cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:20px;" width="100%">
    <tr>
        <td align="center">
            <table cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;"
                   width="600">

                <tr>
                    <td align="center"
                        style="background:#2563eb;padding:30px;color:white;">
                        <h1 style="margin:0;">TrustMart</h1>
                    </td>
                </tr>

                <tr>
                    <td style="padding:40px 30px;">
                        <h2 style="margin-top:0;color:#333;">
                            Verify Your Email
                        </h2>

                        <p style="font-size:16px;color:#555;line-height:1.6;">
                            Use the verification code below to continue.
                        </p>

                        <div style="
                            text-align:center;
                            margin:30px 0;
                            padding:20px;
                            background:#f8fafc;
                            border:1px solid #e2e8f0;
                            border-radius:8px;">

                            <span style="
                                font-size:32px;
                                font-weight:bold;
                                letter-spacing:8px;
                                color:#2563eb;"
                                  th:text="${otp}">
                                123456
                            </span>

                        </div>

                        <p style="font-size:16px;color:#555;">
                            This code expires at:
                        </p>

                        <p style="
                            font-size:16px;
                            font-weight:bold;
                            color:#dc2626;"
                           th:text="${#temporals.format(expiry, 'dd MMM yyyy HH:mm:ss')}">
                            21 Jun 2026 12:30:00
                        </p>

                        <p style="font-size:14px;color:#666;line-height:1.6;">
                            If you did not request this code, you can safely ignore this email.
                            Never share your OTP with anyone.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td align="center"
                        style="padding:20px;background:#f8fafc;color:#666;font-size:12px;">
                        © 2026 TrustMart. All rights reserved.
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
