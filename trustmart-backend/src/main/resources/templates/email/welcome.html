<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to TrustMart</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Arial,Helvetica,sans-serif;">

<table border="0" cellpadding="0" cellspacing="0" style="padding:40px 0;" width="100%">
    <tr>
        <td align="center">
            <table border="0" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;"
                   width="560">

                <!-- Header -->
                <tr>
                    <td style="background:#0c447c;padding:36px 40px;">
                        <table border="0" cellpadding="0" cellspacing="0" style="margin-bottom:20px;">
                            <tr>
                                <td style="background:#185fa5;border-radius:8px;padding:7px 9px;vertical-align:middle;">
                                    &#128722;
                                </td>
                                <td style="padding-left:10px;font-size:15px;font-weight:600;color:#b5d4f4;letter-spacing:0.02em;">
                                    TrustMart
                                </td>
                            </tr>
                        </table>
                        <h1 style="margin:0 0 6px;font-size:22px;font-weight:600;color:#e6f1fb;">
                            Welcome, <span th:text="${name}">User</span>
                        </h1>
                        <p style="margin:0;font-size:14px;color:#85b7eb;line-height:1.6;">
                            Your account is set up and ready to go.
                        </p>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:32px 40px;">

                        <!-- Success badge -->
                        <table border="0" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
                            <tr>
                                <td style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;color:#15803d;">
                                    &#10003; Registration successful
                                </td>
                            </tr>
                        </table>

                        <p style="margin:0 0 20px;font-size:14px;color:#64748b;line-height:1.7;">
                            Here's a summary of your account details:
                        </p>

                        <!-- Details card -->
                        <table border="0" cellpadding="0" cellspacing="0" style="border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:28px;"
                               width="100%">
                            <tr style="border-bottom:1px solid #e2e8f0;">
                                <td style="padding:14px 16px;border-bottom:1px solid #e2e8f0;">
                                    <p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;">
                                        User ID</p>
                                    <p style="margin:4px 0 0;font-size:13px;font-weight:600;color:#0f172a;font-family:monospace;"
                                       th:text="${id}"></p>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:14px 16px;border-bottom:1px solid #e2e8f0;">
                                    <p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;">
                                        Name</p>
                                    <p style="margin:4px 0 0;font-size:13px;font-weight:600;color:#0f172a;"
                                       th:text="${name}"></p>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:14px 16px;border-bottom:1px solid #e2e8f0;">
                                    <p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;">
                                        Email</p>
                                    <p style="margin:4px 0 0;font-size:13px;font-weight:600;color:#0f172a;"
                                       th:text="${email}"></p>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:14px 16px;">
                                    <p style="margin:0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;">
                                        Address</p>
                                    <p style="margin:4px 0 0;font-size:13px;font-weight:600;color:#0f172a;"
                                       th:text="${address}"></p>
                                </td>
                            </tr>
                        </table>

                        <!-- CTA -->
                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                                <td align="center" style="background:#0c447c;border-radius:8px;">
                                    <a href="https://trustmart.com"
                                       style="display:block;padding:13px 24px;font-size:14px;font-weight:600;color:#e6f1fb;text-decoration:none;text-align:center;">
                                        Start shopping &rarr;
                                    </a>
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding:16px 40px;border-top:1px solid #e2e8f0;">
                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                            <tr>
                                <td style="font-size:12px;color:#94a3b8;">© 2026 TrustMart</td>
                                <td align="right">
                                    <a href="mailto:support@trustmart.com"
                                       style="font-size:12px;color:#94a3b8;text-decoration:none;">Support</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
