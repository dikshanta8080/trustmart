<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to TrustMart</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">

<table border="0" cellpadding="0" cellspacing="0" style="padding:32px 0;" width="100%">
    <tr>
        <td align="center">
            <table border="0" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;border:1px solid #e2e8f0;"
                   width="560">

                <!-- Header -->
                <tr>
                    <td style="padding:24px 32px;border-bottom:1px solid #e2e8f0;">
                        <p style="margin:0;font-size:18px;font-weight:600;color:#111827;">TrustMart</p>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:32px;color:#111827;">
                        <h2 style="margin:0 0 8px;font-size:18px;font-weight:600;">
                            Welcome, <span th:text="${name}">User</span>
                        </h2>
                        <p style="margin:0 0 24px;font-size:14px;color:#6b7280;line-height:1.6;">
                            Your account is ready. Here are your details:
                        </p>

                        <table border="0" cellpadding="0" cellspacing="0" style="font-size:13px;border-collapse:collapse;margin-bottom:28px;"
                               width="100%">
                            <tr style="border-bottom:1px solid #e2e8f0;">
                                <td style="padding:8px 0;color:#6b7280;width:90px;">User ID</td>
                                <td style="padding:8px 0;" th:text="${id}"></td>
                            </tr>
                            <tr style="border-bottom:1px solid #e2e8f0;">
                                <td style="padding:8px 0;color:#6b7280;">Name</td>
                                <td style="padding:8px 0;" th:text="${name}"></td>
                            </tr>
                            <tr style="border-bottom:1px solid #e2e8f0;">
                                <td style="padding:8px 0;color:#6b7280;">Email</td>
                                <td style="padding:8px 0;" th:text="${email}"></td>
                            </tr>
                            <tr>
                                <td style="padding:8px 0;color:#6b7280;">Address</td>
                                <td style="padding:8px 0;" th:text="${address}"></td>
                            </tr>
                        </table>

                        <a href="https://trustmart.com"
                           style="display:inline-block;padding:10px 20px;background:#2563eb;border-radius:6px;font-size:13px;font-weight:600;color:#ffffff;text-decoration:none;">
                            Start shopping →
                        </a>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding:16px 32px;border-top:1px solid #e2e8f0;">
                        <p style="margin:0;font-size:12px;color:#9ca3af;">
                            © 2026 TrustMart ·
                            <a href="mailto:support@trustmart.com" style="color:#9ca3af;">Support</a>
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
